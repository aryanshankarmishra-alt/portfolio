<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Recruiter Assistant — Aryansh</title>
  <style>
    :root{font-family:system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;color:#0f172a}
    body{background:#f8fafc;display:flex;align-items:center;justify-content:center;height:100vh;margin:0}
    .card{width:420px;background:#ffffff;border-radius:12px;box-shadow:0 6px 24px rgba(2,6,23,0.08);overflow:hidden}
    .header{padding:16px 20px;border-bottom:1px solid #eef2f7;background:linear-gradient(90deg,#06b6d420,#7c3aed10)}
    .header h1{margin:0;font-size:16px}
    .messages{height:440px;overflow:auto;padding:16px;display:flex;flex-direction:column;gap:8px;background:linear-gradient(180deg,#ffffff,#f8fafc)}
    .msg{max-width:78%;padding:10px 12px;border-radius:12px;font-size:14px;line-height:1.3}
    .user{align-self:flex-end;background:#06b6d4;color:#022; border-bottom-right-radius:4px}
    .bot{align-self:flex-start;background:#eef2ff;color:#031233;border-bottom-left-radius:4px}
    form{display:flex;gap:8px;padding:12px;border-top:1px solid #eef2f7}
    input{flex:1;padding:10px 12px;border:1px solid #e6e9ef;border-radius:8px;font-size:14px}
    button{background:#0ea5a4;color:white;border:none;padding:10px 12px;border-radius:8px;cursor:pointer}
    .hint{font-size:12px;color:#64748b;padding:8px 16px}
    a.small{font-size:12px;color:#475569}
  </style>
</head>
<body>
  <div class="card" role="application" aria-label="Recruiter assistant chat">
    <div class="header">
      <h1>Recruiter Assistant — Ask me about my experience</h1>
      <div class="hint">Tip: try "What technologies do you use?" or "How can I contact you?"</div>
    </div>

    <div id="messages" class="messages" aria-live="polite"></div>

    <form id="form" autocomplete="off">
      <input id="input" placeholder="Ask a question for the recruiter..." />
      <button type="submit">Send</button>
    </form>
  </div>

  <script src="./assistant.js"></script>
</body>
</html>
